<p>By the end of this session you'll understand how to:</p>
<ul>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-class="section" data-theme="tech" lang="en-IN" class="section" data-marpit-pagination="5" style="--paginate:true;--class:section;--theme:tech;" data-marpit-pagination-total="33">
<h1 id="making-decisions">Making decisions</h1>
<h2 id="if--elif--else-and-truthiness"><code>if</code> / <code>elif</code> / <code>else</code> and truthiness</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="tech" lang="en-IN" data-marpit-pagination="6" style="--paginate:true;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="branching-with-if--elif--else">Branching with <code>if</code> / <code>elif</code> / <code>else</code></h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">if</span> score &gt;= <span class="hljs-number">90</span>:
    grade = <span class="hljs-string">&quot;A&quot;</span>
<span class="hljs-keyword">elif</span> score &gt;= <span class="hljs-number">80</span>:
    grade = <span class="hljs-string">&quot;B&quot;</span>
<span class="hljs-keyword">else</span>:
    grade = <span class="hljs-string">&quot;C&quot;</span>
</code></pre>
<ul>
<li><strong>Indentation</strong> defines the block — no braces, no <code>end</code></li>
<li>Zero or more <code>elif</code>; <code>else</code> optional</li>
<li>The <strong>first</strong> true branch wins; the rest are skipped</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="tech" lang="en-IN" data-marpit-pagination="7" style="--paginate:true;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="truthiness--what-counts-as-true">Truthiness — what counts as &quot;true&quot;?</h2>
<p>These are the <strong>falsy</strong> values; everything else is truthy:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-number">0</span>      <span class="hljs-number">0.0</span>      <span class="hljs-string">&quot;&quot;</span>      []      {}      ()      <span class="hljs-built_in">set</span>()      <span class="hljs-literal">None</span>      <span class="hljs-literal">False</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">name = <span class="hljs-string">&quot;&quot;</span>
<span class="hljs-keyword">if</span> name:           <span class="hljs-comment"># empty string is falsy</span>
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;hi&quot;</span>, name)
<span class="hljs-keyword">else</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;no name given&quot;</span>)
</code></pre>
<p>A value used directly in <code>if</code> is tested for truthiness.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="tech" lang="en-IN" data-marpit-pagination="8" style="--paginate:true;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="boolean-logic--chained-comparisons">Boolean logic &amp; chained comparisons</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">if</span> age &gt;= <span class="hljs-number">18</span> <span class="hljs-keyword">and</span> has_ticket:
    enter()

<span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> done:
    keep_going()

<span class="hljs-keyword">if</span> <span class="hljs-number">0</span> &lt;= hour &lt; <span class="hljs-number">24</span>:        <span class="hljs-comment"># chained — reads like maths</span>
    valid = <span class="hljs-literal">True</span>
</code></pre>
<ul>
<li><code>and</code>, <code>or</code>, <code>not</code> combine conditions</li>
<li><code>0 &lt;= hour &lt; 24</code> means <code>0 &lt;= hour and hour &lt; 24</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-class="section" data-theme="tech" lang="en-IN" class="section" data-marpit-pagination="9" style="--paginate:true;--class:section;--theme:tech;" data-marpit-pagination-total="33">
<h1 id="repeating-work">Repeating work</h1>
<h2 id="loops--loop-control">Loops &amp; loop control</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="tech" lang="en-IN" data-marpit-pagination="10" style="--paginate:true;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="for-loops--range"><code>for</code> loops &amp; <code>range()</code></h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">for</span> ch <span class="hljs-keyword">in</span> <span class="hljs-string">&quot;abc&quot;</span>:          <span class="hljs-comment"># over a sequence</span>
    <span class="hljs-built_in">print</span>(ch)

<span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">5</span>):        <span class="hljs-comment"># 0, 1, 2, 3, 4</span>
    <span class="hljs-built_in">print</span>(i)

<span class="hljs-built_in">range</span>(<span class="hljs-number">2</span>, <span class="hljs-number">10</span>)              <span class="hljs-comment"># start, stop</span>
<span class="hljs-built_in">range</span>(<span class="hljs-number">0</span>, <span class="hljs-number">10</span>, <span class="hljs-number">2</span>)           <span class="hljs-comment"># start, stop, step</span>
</code></pre>
<p><code>range(stop)</code> ends <strong>before</strong> <code>stop</code>. A <code>for</code> walks any sequence.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="tech" lang="en-IN" data-marpit-pagination="11" style="--paginate:true;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="while-loops--sentinels"><code>while</code> loops &amp; sentinels</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python">count = <span class="hljs-number">3</span>
<span class="hljs-keyword">while</span> count &gt; <span class="hljs-number">0</span>:
    <span class="hljs-built_in">print</span>(count)
    count -= <span class="hljs-number">1</span>            <span class="hljs-comment"># must move toward the exit!</span>

<span class="hljs-keyword">while</span> <span class="hljs-literal">True</span>:
    line = <span class="hljs-built_in">input</span>(<span class="hljs-string">&quot;&gt; &quot;</span>)
    <span class="hljs-keyword">if</span> line == <span class="hljs-string">&quot;quit&quot;</span>:    <span class="hljs-comment"># sentinel condition</span>
        <span class="hljs-keyword">break</span>
</code></pre>
<ul>
<li><code>for</code> = &quot;do this N times / for each item&quot;</li>
<li><code>while</code> = &quot;keep going <strong>until</strong> a condition flips&quot;</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="tech" lang="en-IN" data-marpit-pagination="12" style="--paginate:true;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="break-continue-pass"><code>break</code>, <code>continue</code>, <code>pass</code></h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">for</span> n <span class="hljs-keyword">in</span> nums:
    <span class="hljs-keyword">if</span> n &lt; <span class="hljs-number">0</span>:
        <span class="hljs-keyword">continue</span>          <span class="hljs-comment"># skip this one, keep looping</span>
    <span class="hljs-keyword">if</span> n == stop:
        <span class="hljs-keyword">break</span>             <span class="hljs-comment"># leave the loop now</span>
    process(n)

<span class="hljs-keyword">if</span> <span class="hljs-keyword">not</span> ready:
    <span class="hljs-keyword">pass</span>                  <span class="hljs-comment"># placeholder: do nothing (yet)</span>
</code></pre>
<ul>
<li><strong><code>continue</code></strong> → next iteration · <strong><code>break</code></strong> → exit the loop</li>
<li><strong><code>pass</code></strong> → a no-op where syntax needs a statement</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="tech" lang="en-IN" data-marpit-pagination="13" style="--paginate:true;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="the-loop-else-clause">The loop-<code>else</code> clause</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">for</span> item <span class="hljs-keyword">in</span> inventory:
    <span class="hljs-keyword">if</span> item == target:
        <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;found it&quot;</span>)
        <span class="hljs-keyword">break</span>
<span class="hljs-keyword">else</span>:
    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;not found&quot;</span>)    <span class="hljs-comment"># runs only if NO break happened</span>
</code></pre>
<ul>
<li><code>else</code> on a loop fires <strong>when the loop finishes without <code>break</code></strong></li>
<li>Perfect for &quot;search and report not-found&quot;</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-class="lead" data-theme="tech" lang="en-IN" class="lead" data-marpit-pagination="14" style="--paginate:true;--class:lead;--theme:tech;" data-marpit-pagination-total="33">
<h1 id="lets-run-every-loop-live">Let's run every loop, live.</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-class="dark" data-theme="tech" lang="en-IN" class="dark" data-marpit-pagination="15" style="--paginate:true;--class:dark;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="watch-this--demo-7">Watch this — Demo 7</h2>
<p><strong>Loops &amp; <code>range</code> patterns</strong></p>
<ul>
<li><code>for i in range(5)</code> and <code>for ch in &quot;abc&quot;</code></li>
<li>A <code>while</code> countdown with a <strong>sentinel</strong></li>
<li><code>continue</code> to skip evens, <code>break</code> to stop early</li>
<li>A <code>for ... else</code> that prints &quot;not found&quot; only when no <code>break</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-class="dark" data-theme="tech" lang="en-IN" class="dark" data-marpit-pagination="16" style="--paginate:true;--class:dark;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="loops-in-action">Loops in action</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-pycon"><span class="hljs-meta prompt_">&gt;&gt;&gt;</span> <span class="language-python"><span class="hljs-keyword">for</span> i <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">0</span>, <span class="hljs-number">6</span>, <span class="hljs-number">2</span>):</span>
<span class="hljs-meta prompt_">...</span> <span class="language-python">    <span class="hljs-built_in">print</span>(i)</span>
0
2
4
<span class="hljs-meta prompt_">&gt;&gt;&gt;</span> <span class="language-python"><span class="hljs-keyword">for</span> n <span class="hljs-keyword">in</span> <span class="hljs-built_in">range</span>(<span class="hljs-number">10</span>):</span>
<span class="hljs-meta prompt_">...</span> <span class="language-python">    <span class="hljs-keyword">if</span> n % <span class="hljs-number">2</span> == <span class="hljs-number">0</span>:</span>
<span class="hljs-meta prompt_">...</span> <span class="language-python">        <span class="hljs-keyword">continue</span></span>
<span class="hljs-meta prompt_">...</span> <span class="language-python">    <span class="hljs-keyword">if</span> n &gt; <span class="hljs-number">5</span>:</span>
<span class="hljs-meta prompt_">...</span> <span class="language-python">        <span class="hljs-keyword">break</span></span>
<span class="hljs-meta prompt_">...</span> <span class="language-python">    <span class="hljs-built_in">print</span>(n)</span>
1
3
5
</code></pre>
<p><code>continue</code> skips; <code>break</code> exits.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-class="dark" data-theme="tech" lang="en-IN" class="dark" data-marpit-pagination="17" style="--paginate:true;--class:dark;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="search-with-loop-else">Search with loop-<code>else</code></h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-pycon"><span class="hljs-meta prompt_">&gt;&gt;&gt;</span> <span class="language-python">target = <span class="hljs-number">7</span></span>
<span class="hljs-meta prompt_">&gt;&gt;&gt;</span> <span class="language-python"><span class="hljs-keyword">for</span> n <span class="hljs-keyword">in</span> [<span class="hljs-number">1</span>, <span class="hljs-number">3</span>, <span class="hljs-number">5</span>]:</span>
<span class="hljs-meta prompt_">...</span> <span class="language-python">    <span class="hljs-keyword">if</span> n == target:</span>
<span class="hljs-meta prompt_">...</span> <span class="language-python">        <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;found&quot;</span>)</span>
<span class="hljs-meta prompt_">...</span> <span class="language-python">        <span class="hljs-keyword">break</span></span>
<span class="hljs-meta prompt_">...</span> <span class="language-python"><span class="hljs-keyword">else</span>:</span>
<span class="hljs-meta prompt_">...</span> <span class="language-python">    <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;not found&quot;</span>)</span>
not found
</code></pre>
<p>No <code>break</code> fired → the <code>else</code> ran.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="tech" lang="en-IN" data-marpit-pagination="18" style="--paginate:true;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="what-you-just-saw">What you just saw</h2>
<ul>
<li><code>range()</code> drives counted loops; <code>for</code> walks any sequence</li>
<li>A <code>while</code> repeats <strong>until</strong> its condition flips</li>
<li><code>continue</code> skips one turn; <code>break</code> leaves entirely</li>
<li>loop-<code>else</code> runs <strong>only when no <code>break</code></strong> happened</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-class="section" data-theme="tech" lang="en-IN" class="section" data-marpit-pagination="19" style="--paginate:true;--class:section;--theme:tech;" data-marpit-pagination-total="33">
<h1 id="pattern-matching">Pattern matching</h1>
<h2 id="match--case--branch-on-shape"><code>match</code> / <code>case</code> — branch on <strong>shape</strong></h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="tech" lang="en-IN" data-marpit-pagination="20" style="--paginate:true;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="why-match--case">Why <code>match</code> / <code>case</code>?</h2>
<ul>
<li>A cleaner way to branch when the data has <strong>structure</strong></li>
<li>Not just &quot;is it equal?&quot; — also <strong>&quot;what shape is it?&quot;</strong></li>
<li>Stable since 3.10, unchanged in 3.14</li>
<li>It can <strong>destructure</strong> and <strong>bind</strong> names in one step</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">match</span> status:
    <span class="hljs-keyword">case</span> <span class="hljs-number">400</span>: ...
    <span class="hljs-keyword">case</span> <span class="hljs-number">404</span>: ...
    <span class="hljs-keyword">case</span> _:   ...        <span class="hljs-comment"># the wildcard: matches anything</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="tech" lang="en-IN" data-marpit-pagination="21" style="--paginate:true;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="literal-capture--wildcard">Literal, capture &amp; wildcard</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">match</span> command:
    <span class="hljs-keyword">case</span> <span class="hljs-string">&quot;quit&quot;</span>:             <span class="hljs-comment"># literal — exact value</span>
        stop()
    <span class="hljs-keyword">case</span> other:              <span class="hljs-comment"># capture — binds the value</span>
        <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;unknown:&quot;</span>, other)
    <span class="hljs-keyword">case</span> _:                  <span class="hljs-comment"># wildcard — matches, binds nothing</span>
        <span class="hljs-keyword">pass</span>
</code></pre>
<ul>
<li>A bare name is a <strong>capture</strong>, not a comparison</li>
<li><code>_</code> matches anything and discards it</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="tech" lang="en-IN" data-marpit-pagination="22" style="--paginate:true;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="sequence--or-patterns">Sequence &amp; or-patterns</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">match</span> command.split():
    <span class="hljs-keyword">case</span> [<span class="hljs-string">&quot;add&quot;</span>, task]:           <span class="hljs-comment"># exactly 2 items</span>
        add(task)
    <span class="hljs-keyword">case</span> [<span class="hljs-string">&quot;list&quot;</span>] | [<span class="hljs-string">&quot;ls&quot;</span>]:       <span class="hljs-comment"># or-pattern</span>
        show()
    <span class="hljs-keyword">case</span> [<span class="hljs-string">&quot;tags&quot;</span>, *rest]:         <span class="hljs-comment"># *rest captures the tail</span>
        tag(rest)
</code></pre>
<ul>
<li><code>[x, y]</code> matches a 2-element sequence, binding <code>x</code>, <code>y</code></li>
<li><code>*rest</code> soaks up the remaining items</li>
<li><code>|</code> lets one <code>case</code> match several shapes</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="tech" lang="en-IN" data-marpit-pagination="23" style="--paginate:true;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="mapping-patterns--guards">Mapping patterns &amp; guards</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">match</span> payload:
    <span class="hljs-keyword">case</span> {<span class="hljs-string">&quot;cmd&quot;</span>: c}:              <span class="hljs-comment"># has a &quot;cmd&quot; key</span>
        run(c)
    <span class="hljs-keyword">case</span> [<span class="hljs-string">&quot;done&quot;</span>, <span class="hljs-built_in">id</span>] <span class="hljs-keyword">if</span> <span class="hljs-built_in">id</span>.isdigit():   <span class="hljs-comment"># guard</span>
        complete(<span class="hljs-built_in">int</span>(<span class="hljs-built_in">id</span>))
    <span class="hljs-keyword">case</span> _:
        <span class="hljs-built_in">print</span>(<span class="hljs-string">&quot;unknown&quot;</span>)
</code></pre>
<ul>
<li><code>{&quot;cmd&quot;: c}</code> matches a dict with that key (extras ignored)</li>
<li>A <strong>guard</strong> <code>if ...</code> adds a condition the pattern must also pass</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="tech" lang="en-IN" data-marpit-pagination="24" style="--paginate:true;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="the-order-rule">The order rule</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">match</span> value:
    <span class="hljs-keyword">case</span> <span class="hljs-number">0</span>:        ...    <span class="hljs-comment"># checked first</span>
    <span class="hljs-keyword">case</span> <span class="hljs-built_in">int</span>():    ...    <span class="hljs-comment"># then this</span>
    <span class="hljs-keyword">case</span> _:        ...    <span class="hljs-comment"># always last — the catch-all</span>
</code></pre>
<ul>
<li>Cases are tried <strong>top to bottom</strong>; first match wins</li>
<li>Put <strong>specific</strong> patterns above <strong>general</strong> ones</li>
<li>A <code>case _:</code> at the end means &quot;no input goes unhandled&quot;</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-class="lead" data-theme="tech" lang="en-IN" class="lead" data-marpit-pagination="25" style="--paginate:true;--class:lead;--theme:tech;" data-marpit-pagination-total="33">
<h1 id="lets-route-a-command-by-its-shape">Let's route a command by its shape.</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-class="dark" data-theme="tech" lang="en-IN" class="dark" data-marpit-pagination="26" style="--paginate:true;--class:dark;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="watch-this--demo-8">Watch this — Demo 8</h2>
<p><strong><code>match</code> / <code>case</code> command dispatcher</strong></p>
<ul>
<li><code>match command.split():</code></li>
<li><code>case [&quot;add&quot;, task]:</code> · <code>case [&quot;done&quot;, id] if id.isdigit():</code></li>
<li><code>case [&quot;list&quot;] | [&quot;ls&quot;]:</code> · <code>case {&quot;cmd&quot;: c}:</code> · <code>case _:</code></li>
<li>Run several inputs live and watch each route</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-class="dark" data-theme="tech" lang="en-IN" class="dark" data-marpit-pagination="27" style="--paginate:true;--class:dark;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="the-dispatcher">The dispatcher</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-keyword">def</span> <span class="hljs-title function_">dispatch</span>(<span class="hljs-params">command</span>):
    <span class="hljs-keyword">match</span> command.split():
        <span class="hljs-keyword">case</span> [<span class="hljs-string">&quot;add&quot;</span>, *words]:
            <span class="hljs-keyword">return</span> <span class="hljs-string">f&quot;added: <span class="hljs-subst">{<span class="hljs-string">&#x27; &#x27;</span>.join(words)}</span>&quot;</span>
        <span class="hljs-keyword">case</span> [<span class="hljs-string">&quot;done&quot;</span>, <span class="hljs-built_in">id</span>] <span class="hljs-keyword">if</span> <span class="hljs-built_in">id</span>.isdigit():
            <span class="hljs-keyword">return</span> <span class="hljs-string">f&quot;completed #<span class="hljs-subst">{<span class="hljs-built_in">id</span>}</span>&quot;</span>
        <span class="hljs-keyword">case</span> [<span class="hljs-string">&quot;list&quot;</span>] | [<span class="hljs-string">&quot;ls&quot;</span>]:
            <span class="hljs-keyword">return</span> <span class="hljs-string">&quot;showing all tasks&quot;</span>
        <span class="hljs-keyword">case</span> []:
            <span class="hljs-keyword">return</span> <span class="hljs-string">&quot;type a command&quot;</span>
        <span class="hljs-keyword">case</span> _:
            <span class="hljs-keyword">return</span> <span class="hljs-string">&quot;unknown command&quot;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-class="dark" data-theme="tech" lang="en-IN" class="dark" data-marpit-pagination="28" style="--paginate:true;--class:dark;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="one-input-the-right-route">One input, the right route</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-pycon"><span class="hljs-meta prompt_">&gt;&gt;&gt;</span> <span class="language-python">dispatch(<span class="hljs-string">&quot;add buy milk&quot;</span>)</span>
&#x27;added: buy milk&#x27;
<span class="hljs-meta prompt_">&gt;&gt;&gt;</span> <span class="language-python">dispatch(<span class="hljs-string">&quot;done 7&quot;</span>)</span>
&#x27;completed #7&#x27;
<span class="hljs-meta prompt_">&gt;&gt;&gt;</span> <span class="language-python">dispatch(<span class="hljs-string">&quot;ls&quot;</span>)</span>
&#x27;showing all tasks&#x27;
<span class="hljs-meta prompt_">&gt;&gt;&gt;</span> <span class="language-python">dispatch(<span class="hljs-string">&quot;frobnicate&quot;</span>)</span>
&#x27;unknown command&#x27;
</code></pre>
<p>The capstone's menu reuses exactly this shape.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="tech" lang="en-IN" data-marpit-pagination="29" style="--paginate:true;--theme:tech;" data-marpit-pagination-total="33">
<h2 id="what-you-just-saw-1">What you just saw</h2>
<ul>
<li>One <code>match</code> routed <strong>five different command shapes</strong></li>
<li>Literal, capture, sequence, or-, and mapping patterns + a guard</li>
<li><code>*words</code> captured a variable-length tail</li>
<li>The final <code>case _:</code> caught everything unexpected</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-class="section" data-theme="tech" lang="en-IN" class="section" data-marpit-pagination="30" style="--paginate:true;--class:section;--theme:tech;" data-marpit-pagination-total="33">
